[pytest]
# pytest 配置檔案 / pytest configuration file

# 最小 pytest 版本 / Minimum pytest version
minversion = 6.0

# 測試路徑 / Test paths
testpaths = tests global_parallel_network/tests particle_unified_system/tests terminal_seed/tests

# Python 檔案模式 / Python file patterns
python_files = test_*.py *_test.py

# Python 類別模式 / Python class patterns
python_classes = Test*

# Python 函數模式 / Python function patterns
python_functions = test_*

# 自定義標記 / Custom markers
markers =
    unit: 單元測試標記 (Unit test marker)
    integration: 整合測試標記 (Integration test marker)
    slow: 慢速測試標記 (Slow test marker)
    particle: 粒子系統相關測試 (Particle system related tests)
    memory: 記憶系統相關測試 (Memory system related tests)
    core: 核心模組測試 (Core module tests)
    api: API 相關測試 (API related tests)
    e2e: 端對端測試 (End-to-end tests)

# 輸出選項 / Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# 覆蓋率報告 / Coverage report
[coverage:run]
source = .
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
