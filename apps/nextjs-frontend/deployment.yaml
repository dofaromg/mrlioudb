apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-frontend
  namespace: flowagent
  labels:
    app: nextjs-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-frontend
  template:
    metadata:
      labels:
        app: nextjs-frontend
        component: frontend
    spec:
      containers:
      - name: nextjs
        image: asia-east1-docker.pkg.dev/flowmemorysync/flowagent/nextjs-frontend:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: NEXT_PUBLIC_GROWTHBOOK_API_HOST
          valueFrom:
            secretKeyRef:
              name: nextjs-secrets
              key: growthbook-api-host
              optional: true
        - name: NEXT_PUBLIC_GROWTHBOOK_CLIENT_KEY
          valueFrom:
            secretKeyRef:
              name: nextjs-secrets
              key: growthbook-client-key
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-frontend
  namespace: flowagent
  labels:
    app: nextjs-frontend
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: nextjs-frontend
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
