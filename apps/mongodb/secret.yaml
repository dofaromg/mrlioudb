apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: flowagent
type: Opaque
stringData:
  # ⚠️  重要：請勿在此處存儲實際密碼！/ IMPORTANT: Do not store actual passwords here!
  # 
  # 生產環境部署方法 / Production Deployment Methods:
  #
  # 方法 1: 使用命令行創建 Secret / Method 1: Create Secret via command line
  # kubectl create secret generic mongodb-secret \
  #   --from-literal=password='YOUR_SECURE_PASSWORD_HERE' \
  #   --namespace=flowagent
  #
  # 方法 2: 使用密碼生成腳本 / Method 2: Use password generation script
  # bash scripts/generate_password.sh
  #
  # 方法 3: Google Secret Manager (推薦 / Recommended)
  # gcloud secrets create mongodb-password --data-file=<(echo 'YOUR_PASSWORD')
  # 然後使用 External Secrets Operator 同步
  #
  # 開發/測試環境臨時密碼（僅供參考，請立即更換）
  # Development/Test temporary password (for reference only, change immediately)
  password: "PLEASE_CHANGE_THIS_PASSWORD_BEFORE_DEPLOYMENT"
