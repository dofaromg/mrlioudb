# CI/CD Pipeline Configuration
# CI/CD 類比訊號處理配置

pipeline:
  name: "Satellite Network CI/CD Signal Flow"
  description: "將 CI/CD 流程映射為衛星通訊訊號傳輸"
  
  trigger:
    layer: "ground"
    event_types:
      - "git_push"
      - "pull_request"
      - "manual_deployment"
    webhook_endpoint: "/api/cicd/webhook"
    
  signal_flow:
    # 訊號傳輸路徑
    - stage: "source_reception"
      layer: "ground"
      description: "接收源碼變更事件"
      next_layer: "LEO"
      
    - stage: "source_processing"
      layer: "LEO"
      description: "邊緣處理：代碼檢查、安全掃描"
      tasks:
        - name: "lint"
          command: "npm run lint"
          timeout: 60
        - name: "security_scan"
          command: "npm audit"
          timeout: 120
      next_layer: "MEO"
      
    - stage: "build_test"
      layer: "MEO"
      description: "區域處理：構建、測試、驗證"
      tasks:
        - name: "build"
          command: "npm run build"
          timeout: 300
        - name: "unit_test"
          command: "npm test"
          timeout: 180
        - name: "integration_test"
          command: "npm run test:integration"
          timeout: 300
      next_layer: "GEO"
      
    - stage: "deployment_coordination"
      layer: "GEO"
      description: "全局協調：部署策略、多環境同步"
      tasks:
        - name: "deploy_staging"
          target: "staging"
          timeout: 600
        - name: "smoke_test"
          command: "npm run test:smoke"
          timeout: 120
        - name: "deploy_production"
          target: "production"
          timeout: 600
          approval_required: true
      next_layer: "ground"
      
    - stage: "deployment_complete"
      layer: "ground"
      description: "完成部署，通知用戶"
      notifications:
        - type: "slack"
          channel: "#deployments"
        - type: "email"
          recipients: ["team@example.com"]

  layers:
    ground:
      role: "trigger_and_notification"
      capabilities:
        - "receive_git_events"
        - "send_notifications"
        - "user_interface"
      
    leo:
      role: "edge_processing"
      capabilities:
        - "fast_linting"
        - "security_scanning"
        - "code_analysis"
      processing_mode: "parallel"
      max_concurrent_jobs: 10
      
    meo:
      role: "regional_coordination"
      capabilities:
        - "build_management"
        - "test_execution"
        - "artifact_storage"
      processing_mode: "sequential"
      retry_policy:
        max_retries: 3
        backoff: "exponential"
      
    geo:
      role: "global_orchestration"
      capabilities:
        - "deployment_coordination"
        - "multi_region_sync"
        - "approval_workflow"
      processing_mode: "coordinated"
      approval_timeout: 3600  # 1 hour

  signal_processing:
    encoding: "json"
    compression: true
    encryption: false  # 在私有網路中可選
    
    signal_types:
      git_push:
        priority: "high"
        processing_path: ["ground", "leo", "meo", "geo", "ground"]
      
      pull_request:
        priority: "medium"
        processing_path: ["ground", "leo", "meo", "ground"]
        skip_deployment: true
      
      manual_deployment:
        priority: "critical"
        processing_path: ["ground", "geo", "ground"]
        direct_path: true

  monitoring:
    enabled: true
    metrics:
      - "signal_latency"
      - "processing_time"
      - "success_rate"
      - "error_rate"
    dashboards:
      - "real_time_signal_flow"
      - "layer_performance"
      - "deployment_history"

  error_handling:
    retry_failed_stages: true
    max_retries: 3
    rollback_on_failure: true
    notification_on_error: true
