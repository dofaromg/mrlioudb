# Repository Synchronization Configuration
# 倉庫同步配置檔案
#
# 定義需要從其他 GitHub 倉庫拉取的檔案和目錄
# Define files and directories to pull from other GitHub repositories

version: "1.0"

# 倉庫列表 / Repository List
repositories:
  # GitHub's Hello World - 用於測試和示範
  # GitHub's Hello World - For testing and demonstration
  - name: "github-hello-world"
    url: "https://github.com/octocat/Hello-World.git"
    branch: "master"
    enabled: true
    files:
      - src: "README"
        dest: "examples/synced_files/hello_world_readme.txt"

  # Python .gitignore 模板
  # Python .gitignore template
  - name: "python-gitignore"
    url: "https://github.com/github/gitignore.git"
    branch: "main"
    enabled: false  # 預設停用，需要時啟用 / Disabled by default, enable when needed
    files:
      - src: "Python.gitignore"
        dest: "examples/synced_files/python.gitignore.template"
  
  # PyWikibot Core - Wikimedia 的 Python 機器人框架
  # PyWikibot Core - Python MediaWiki bot framework from Wikimedia
  # 注意：此倉庫可能在某些網路環境中無法訪問
  # Note: This repository may be inaccessible in some network environments
  - name: "pywikibot-core"
    url: "https://gerrit.wikimedia.org/r/pywikibot/core"
    branch: "master"
    enabled: false  # 預設停用，因網路限制 / Disabled by default due to network restrictions
    files:
      - src: "README.rst"
        dest: "examples/pywikibot_readme.rst"
    directories:
      - src: "pywikibot"
        dest: "lib/python/pywikibot"
        exclude:
          - "*.pyc"
          - "__pycache__"
          - "*.egg-info"

  # 1112 Repository - Custom repository for project resources
  # 1112 倉庫 - 專案資源自訂倉庫
  # 注意：此倉庫目前為空，待有內容後啟用
  # Note: This repository is currently empty, enable after content is added
  - name: "repository-1112"
    url: "https://github.com/dofaromg/1112.git"
    branch: "main"
    enabled: false  # 預設停用，倉庫目前為空 / Disabled by default, repository is currently empty
    files:
      - src: "README.md"
        dest: "examples/synced_files/1112_readme.md"
    directories:
      - src: "src"
        dest: "lib/1112"
        exclude:
          - "*.pyc"
          - "__pycache__"
          - "*.egg-info"
          - "node_modules"

  # 範例：從另一個倉庫拉取特定檔案
  # Example: Pull specific files from another repository
  # - name: "example-repo"
  #   url: "https://github.com/username/repository.git"
  #   branch: "main"
  #   enabled: true
  #   files:
  #     - src: "path/to/source/file.txt"
  #       dest: "local/destination/file.txt"
  #     - src: "another/file.py"
  #       dest: "scripts/imported_file.py"
  #   directories:
  #     - src: "source/directory"
  #       dest: "local/directory"
  #       exclude:
  #         - "*.pyc"
  #         - "__pycache__"

  # 範例：拉取整個子目錄作為 Git Submodule
  # Example: Pull entire subdirectory as Git Submodule
  # - name: "shared-library"
  #   url: "https://github.com/username/shared-lib.git"
  #   branch: "main"
  #   enabled: true
  #   submodule: true
  #   dest: "lib/shared-library"

# 同步設定 / Sync Settings
settings:
  # 自動建立備份 / Auto backup before sync
  backup_before_sync: true
  
  # 備份目錄 / Backup directory
  backup_dir: ".sync_backups"
  
  # 衝突處理策略 / Conflict resolution strategy
  # Options: "overwrite", "skip", "prompt"
  conflict_strategy: "skip"
  
  # 驗證檔案完整性 / Verify file integrity
  verify_integrity: true
  
  # 同步後執行的命令 / Commands to run after sync
  post_sync_commands:
    # - "pip install -r requirements.txt"
    # - "npm install"

# 排除模式 / Exclude Patterns (全域)
exclude_patterns:
  - "*.pyc"
  - "__pycache__"
  - ".git"
  - ".github"
  - "node_modules"
  - ".DS_Store"
  - "*.log"
